<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAT Web Highlighter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>RAT Web Highlighter</h1>
      <p class="subtitle">Paste a GitHub file URL and render RAT output in the browser.</p>
      <form id="highlight-form">
        <label for="github-url">GitHub file URL</label>
        <div class="row">
          <input id="github-url" name="github-url" type="url" required placeholder="https://github.com/owner/repo/blob/main/file.go" />
          <button type="submit">Highlight</button>
        </div>
      </form>
      <p id="status" aria-live="polite"></p>
      <section>
        <h2>Output</h2>
        <pre id="output" class="code-output"></pre>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
  </html>
